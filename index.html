<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {

header {

.progress-bar {

}

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

}

.question-card {
  background: white; border-radius: 14px; padding: 18px;

}
.question-card.answered-correct { border-color: #10b981; }

.q-header { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

.q-tag.type-ox { background: #dbeafe; color: #1e40af; }
.q-tag.type-short { background: #fef3c7; color: #92400e; }
.q-tag.type-choice { background: #f3e8ff; color: #6b21a8; }

.q-point { background: #10b981; color: white; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 700; }

.q-text { font-size: 15px; font-weight: 500; margin: 0 0 14px; color: #111827; white-space: pre-wrap; }

.choices { display: flex; flex-direction: column; gap: 7px; }

}
.choice:hover { border-color: #7dd3fc; background: #f0f9ff; }
.choice.selected { border-color: #0ea5e9; background: #f0f9ff; }
.choice.correct { border-color: #10b981; background: #ecfdf5; }
.choice.wrong { border-color: #ef4444; background: #fef2f2; }
.choice.disabled { cursor: default; }

.choice-num {

.choice.selected .choice-num { background: #0ea5e9; border-color: #0ea5e9; color: white; }
.choice.correct .choice-num { background: #10b981; border-color: #10b981; color: white; }
.choice.wrong .choice-num { background: #ef4444; border-color: #ef4444; color: white; }
.choice-text { flex: 1; font-size: 14px; color: #374151; }

/* OX */
.ox-choices { display: flex; gap: 10px; }
.ox-btn {
  flex: 1; padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px;
  background: white; font-size: 22px; font-weight: 800; cursor: pointer;

}
.ox-btn:hover { border-color: #0ea5e9; color: #0ea5e9; }
.ox-btn.selected { border-color: #0ea5e9; background: #f0f9ff; color: #0369a1; }
.ox-btn.correct { border-color: #10b981; background: #ecfdf5; color: #065f46; }
.ox-btn.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }

/* Short answer */
.short-row { display: flex; gap: 8px; }
.short-input {

}
.short-input:focus { border-color: #0ea5e9; background: white; }

.short-input.wrong { border-color: #ef4444; background: #fef2f2; }
.short-submit {
  padding: 10px 18px; border-radius: 10px; border: none;
  background: #0ea5e9; color: white; font-weight: 700; font-size: 14px; cursor: pointer;
}
.short-submit:hover { background: #0284c7; }
.short-submit:disabled { background: #94a3b8; cursor: default; }

/* Essay (서술형) */
.essay-textarea {
  width: 100%; min-height: 110px; padding: 11px 13px;
  border: 1.5px solid #e5e7eb; border-radius: 10px;
  font-size: 14px; font-family: inherit; line-height: 1.55;
  outline: none; background: #fafafa; resize: vertical;
}
.essay-textarea:focus { border-color: #8b5cf6; background: white; }
.essay-textarea:disabled { background: #f9fafb; color: #4b5563; }
.essay-reveal {
  margin-top: 8px; padding: 9px 16px; border-radius: 10px; border: none;
  background: #8b5cf6; color: white; font-weight: 700; font-size: 13.5px; cursor: pointer;
}
.essay-reveal:hover { background: #7c3aed; }
.essay-answer {
  margin-top: 12px; padding: 13px 15px; background: #faf5ff;
  border-left: 4px solid #8b5cf6; border-radius: 8px;

}
.essay-answer .ea-label { font-weight: 700; color: #6d28d9; display: block; margin-bottom: 6px; }
.essay-answer .ea-summary { color: #1f2937; font-weight: 600; margin-bottom: 8px; }
.essay-answer ul { margin: 6px 0 4px 18px; padding: 0; }
.essay-answer li { margin-bottom: 4px; line-height: 1.55; color: #374151; }
.essay-answer .ea-foot { margin-top: 8px; color: #6b7280; font-size: 12.5px; font-style: italic; }

.btn-essay { background: #8b5cf6; color: white; }
.btn-essay:hover { background: #7c3aed; }

.explain {
  margin-top: 12px; padding: 11px 13px; background: #fefce8;
  border-left: 4px solid #facc15; border-radius: 8px;
  font-size: 13px; color: #78350f; display: none;
}
.explain.show { display: block; }
.explain-label { font-weight: 700; margin-right: 6px; color: #a16207; }
.explain .ans-line { display: block; margin-top: 4px; font-weight: 600; color: #422006; }

.controls {
  display: flex; gap: 10px; justify-content: center;
  margin-top: 24px; flex-wrap: wrap;
}
.btn {
  padding: 10px 20px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: #0f766e; color: white; }
.btn-primary:hover { background: #115e59; }
.btn-secondary { background: white; color: #0f766e; border: 1.5px solid #99f6e4; }
.btn-secondary:hover { background: #f0fdfa; }

.result-card {
  background: white; border-radius: 16px; padding: 22px;
  margin-bottom: 14px; text-align: center; display: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}
.result-card.show { display: block; }
.result-score { font-size: 40px; font-weight: 800; color: #0f766e; margin-bottom: 4px; }
.result-detail { font-size: 14px; color: #6b7280; margin-bottom: 12px; }
.result-message { font-size: 16px; font-weight: 600; color: #111827; }
.result-breakdown { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
.result-breakdown span { background: #f3f4f6; color: #374151; padding: 4px 10px; border-radius: 999px; font-size: 12px; }

footer { text-align: center; margin-top: 30px; font-size: 11px; color: #9ca3af; }

/* 모바일 최적화 (≤640px) */
@media (max-width: 640px) {
  body { padding: 12px 10px 72px; font-size: 15px; line-height: 1.55; }
  header { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
  header h1 { font-size: 18px; }
  header p { font-size: 12px; }

  .filter-bar { gap: 5px; margin-bottom: 10px; }
  .filter-btn { padding: 5px 10px; font-size: 11.5px; }

  .question-card { padding: 14px; border-radius: 12px; margin-bottom: 10px; }
  .q-header { gap: 5px; margin-bottom: 8px; }
  .q-num { font-size: 12px; padding: 2px 8px; }
  .q-tag, .q-point { font-size: 10.5px; padding: 2px 6px; }
  .q-text { font-size: 14.5px; margin-bottom: 12px; }
  .q-text code { font-size: 12.5px; }

  .choice { padding: 9px 11px; gap: 9px; border-radius: 9px; }
  .choice-num { width: 20px; height: 20px; font-size: 11.5px; }

  .ox-choices { gap: 8px; }
  .ox-btn { padding: 12px; font-size: 20px; border-radius: 10px; }

  .short-row { flex-wrap: wrap; gap: 8px; }
  .short-input { flex: 1 1 100%; padding: 10px 12px; font-size: 15px; }
  .short-submit { flex: 1 1 100%; padding: 10px; font-size: 14px; }

  .essay-textarea { min-height: 100px; padding: 10px 12px; font-size: 15px; }
  .essay-reveal { width: 100%; padding: 10px; font-size: 14px; }

  .controls { gap: 8px; margin-top: 18px; }
  .btn { padding: 10px 16px; font-size: 13.5px; flex: 1 1 auto; }

  .result-card { padding: 18px; border-radius: 14px; }
  .result-score { font-size: 32px; }

}

/* iOS에서 input 줌 방지 (폰트 16px 미만일 때 자동 줌) */
@media (max-width: 640px) {
  .short-input { font-size: 16px; }
  .essay-textarea { font-size: 16px; }
}
</style>

    <h1>💻 오퍼레이팅시스템 중간고사</h1>

  <footer>교재: 혼자 공부하는 컴퓨터 구조+운영체제 · 인하대 소프트웨어융합공학과 · 📘책 뱃지 = 교재 확인 문제</footer>

<script>
// ============ 문제 풀 ============
// type: 'ox' (1점) | 'short' (2점) | 'choice' (3점)
// book: true 면 📘책 뱃지 (교재 확인 문제에서 거의 그대로)
const POOL = [

  // ========== 01-2장: 컴퓨터 구조의 큰 그림 (p.050~051) ==========
  // 책 확인 문제
  { ch:'1', type:'short', book:true, q:'(빈칸) 컴퓨터가 이해하는 정보에는 ( ① )와 ( ② )가 있습니다. [보기: 명령어, 데이터, CPU, 메모리, 보조기억장치] — 두 단어를 쉼표로 구분해 적으세요.',
    answer:'명령어, 데이터', alts:['데이터, 명령어','명령어,데이터','데이터,명령어'],
    explain:'컴퓨터가 이해하는 정보 = 데이터(data) + 명령어(instruction).' },
  { ch:'1', type:'choice', book:true, q:'컴퓨터의 네 가지 핵심 부품 중 명령어를 해석하고 실행하는 장치를 고르세요.',
    choices:['보조기억장치','입출력장치','CPU','주기억장치'], answer:2,
    explain:'명령어를 해석·실행하는 부품 = CPU.' },
  { ch:'1', type:'short', book:true, q:'(빈칸) 프로그램이 실행되려면 반드시 (     )에 저장되어 있어야 합니다.',
    answer:'메모리', alts:['주기억장치','RAM','메모리(주기억장치)','주기억 장치'],
    explain:'실행 중인 프로그램의 명령어와 데이터는 메모리에 저장되어 있어야 한다.' },
  { ch:'1', type:'short', book:true, q:'(짝짓기) 보조기억장치가 저장하는 것은? (보기: 실행되는 프로그램 / 보관할 프로그램)',
    answer:'보관할 프로그램', alts:['보관할프로그램','전원이 꺼져도 보관할 프로그램','보관할 프로그램 저장'],
    explain:'메모리 = 실행되는 프로그램 저장, 보조기억장치 = 전원이 꺼져도 보관할 프로그램 저장.' },
  { ch:'1', type:'choice', book:true, q:'시스템 버스와 관련하여 옳지 않은 내용을 고르세요.',
    choices:[
      '시스템 버스는 컴퓨터의 핵심 부품을 분리시키는 버스입니다.',
      '시스템 버스는 주소 버스, 데이터 버스, 제어 버스로 구성되어 있습니다.',
      '메인보드 내부에는 시스템 버스를 비롯한 다양한 버스가 있습니다.',
      'CPU가 메모리에 값을 저장할 때 주소 버스, 데이터 버스, 제어 버스를 모두 사용할 수 있습니다.'
    ], answer:0,
    explain:'시스템 버스는 핵심 부품들을 "분리"하는 것이 아니라 "연결하는 통로" 역할을 한다.' },
  // 예상 문제
  { ch:'1', type:'ox', book:false, q:'컴퓨터의 4가지 핵심 부품은 CPU, 주기억장치(메모리), 보조기억장치, 입출력장치이다.', answer:'O',
    explain:'4가지 핵심 부품 + 시스템 버스(메인보드)가 컴퓨터의 큰 그림.' },
  { ch:'1', type:'ox', book:false, q:'RAM(주기억장치)에 저장된 내용은 전원이 꺼지면 사라진다.', answer:'O',
    explain:'RAM은 휘발성(volatile). 비휘발성은 ROM/SSD/HDD.' },
  { ch:'1', type:'ox', book:false, q:'CPU 내부에는 ALU, 제어장치(CU), 레지스터가 들어 있다.', answer:'O',
    explain:'CPU = ALU + 제어장치 + 레지스터들.' },
  { ch:'1', type:'short', book:false, q:'시스템 버스는 주소 버스, 제어 버스와 함께 어떤 버스로 구성되는가?',
    answer:'데이터 버스', alts:['data bus','데이터버스'],
    explain:'시스템 버스 = 주소 버스 + 데이터 버스 + 제어 버스.' },

  // ========== 02-1장: 0과 1로 숫자를 표현하는 방법 (p.064~065) ==========
  // 책 확인 문제
  { ch:'2-1', type:'short', book:true, q:'2000MB는 몇 GB인가요? (정수로, 단위 생략)',
    answer:'2', alts:['2GB','약 2','2 GB','2기가바이트'],
    explain:'1GB ≈ 1000MB 기준으로 2000MB ≈ 2GB.' },
  { ch:'2-1', type:'choice', book:true, q:'다음 중 옳지 않은 것을 골라 보세요.',
    choices:[
      '1000GB는 1TB와 같습니다.',
      '1000kB는 1MB와 같습니다.',
      '1000MB는 1GB와 같습니다.',
      '1024bit는 1byte와 같습니다.'
    ], answer:3,
    explain:'1byte = 8bit이므로 1024bit = 128byte. 나머지는 10진 단위 기준으로 모두 성립.' },
  { ch:'2-1', type:'short', book:true, q:'1101(2)의 음수를 2의 보수 표현법으로 구해 보세요.',

// ============ 출제 설정 ============
// 목표: 40점에 가깝도록 OX×10(10점) + 주관식×8(16점) + 객관식×5(15점) = 41점
const PICK = { ox: 10, short: 8, choice: 5 };
const POINTS = { ox: 1, short: 2, choice: 3 };
const CHAPTERS = ['1', '2-1', '2-2', '3-1', '4-1', '4-2', '4-3', '5-1', '5-2', '5-3', '6-1', '6-2', '6-3'];

// ============ 유틸 ============
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const escapeHtml = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function normalize(s) {
  return String(s).toLowerCase().replace(/\s+/g,'').replace(/[.,\-_/\\()\[\]{}'"`]/g,'');
}
function typeLabel(t){ return t==='ox'?'OX':t==='short'?'주관식':t==='essay'?'서술형':'객관식'; }
function typeClass(t){ return 'type-'+t; }

// ============ 상태 ============
const state = {
  questions: [],
  answers: {},    // idx -> 답(문자열 또는 숫자)
  revealed: {},   // idx -> boolean
  correct: {},    // idx -> boolean
  filter: 'all',
  mode: 'exam',   // 'exam' | 'essay'
  lastQuestions: new Set(), // 직전 세트에서 출제된 문제(객체 참조)
};

// ============ 세트 생성 ============
function buildSet() {
  if (state.mode === 'essay') {
    // 서술형: 모든 essay 문제를 챕터 순으로 정렬해 그대로 출제
    const set = POOL.filter(q => q.type === 'essay').slice();
    set.sort((a, b) => CHAPTERS.indexOf(a.ch) - CHAPTERS.indexOf(b.ch));
    return set;
  }

  const exclude = state.lastQuestions;
  // 직전 세트에 포함된 문제는 제외. 단, 제외 후 남은 풀이 PICK 수보다 적으면 전체 풀로 폴백.
  const pickPool = (type, n) => {
    const full = POOL.filter(q => q.type === type);
    const remaining = full.filter(q => !exclude.has(q));
    return shuffle(remaining.length >= n ? remaining : full).slice(0, n);
  };

  const set = [
    ...pickPool('ox', PICK.ox),
    ...pickPool('short', PICK.short),
    ...pickPool('choice', PICK.choice),
  ];
  // 챕터 순으로 정렬하되 type 내부는 랜덤 유지
  set.sort((a, b) => {
    const ai = CHAPTERS.indexOf(a.ch), bi = CHAPTERS.indexOf(b.ch);
    if (ai !== bi) return ai - bi;
    // 같은 챕터면 OX→주관식→객관식 순
    const order = { ox:0, short:1, choice:2 };
    return order[a.type] - order[b.type];
  });
  return set;
}

function newRound() {
  state.questions = buildSet();
  if (state.mode === 'exam') {
    state.lastQuestions = new Set(state.questions);
  }
  state.answers = {};
  state.revealed = {};
  state.correct = {};
  state.filter = 'all';
  document.getElementById('result-card').classList.remove('show');
  applyModeUI();
  renderFilters();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 채점 ============
function isCorrect(q, ans) {
  if (ans === undefined || ans === null || ans === '') return false;
  if (q.type === 'ox') return ans === q.answer;
  if (q.type === 'choice') return ans === q.answer;
  if (q.type === 'short') {
    const na = normalize(ans);
    const pool = [q.answer, ...(q.alts || [])].map(normalize);
    return pool.includes(na);
  }
  return false;
}

// ============ 렌더링 ============
function render() {
  const container = document.getElementById('quiz-container');
  const list = state.questions
    .map((q, i) => ({ q, i }))
    .filter(x => state.filter === 'all' || x.q.ch === state.filter);

  container.innerHTML = list.map(({ q, i }) => {
    const revealed = !!state.revealed[i];
    const correct = !!state.correct[i];
    const cardClass = revealed ? (correct ? 'answered-correct' : 'answered-wrong') : '';
    const bookBadge = q.book ? '<span class="q-tag book">📘책</span>' : '';
    const tLabel = typeLabel(q.type);

    let body = '';
    if (q.type === 'ox') {
      const sel = state.answers[i];
      const mk = (v) => {
        let cls = 'ox-btn';
        if (revealed) { cls += ' disabled'; if (v === q.answer) cls += ' correct'; else if (v === sel) cls += ' wrong'; }
        else if (sel === v) cls += ' selected';
        return `<button class="${cls}" data-qi="${i}" data-ox="${v}">${v}</button>`;
      };
      body = `<div class="ox-choices">${mk('O')}${mk('X')}</div>`;
    } else if (q.type === 'choice') {
      const sel = state.answers[i];
      body = '<div class="choices">' + q.choices.map((c, ci) => {
        let cls = 'choice';
        if (revealed) { cls += ' disabled'; if (ci === q.answer) cls += ' correct'; else if (ci === sel) cls += ' wrong'; }
        else if (sel === ci) cls += ' selected';
        return `<div class="${cls}" data-qi="${i}" data-ci="${ci}"><div class="choice-num">${ci+1}</div><div class="choice-text">${escapeHtml(c)}</div></div>`;
      }).join('') + '</div>';
    } else if (q.type === 'essay') {
      const val = state.answers[i] ?? '';
      body = `<textarea class="essay-textarea" data-qi="${i}" placeholder="답안을 자유롭게 작성해보세요 (선택)" ${revealed?'disabled':''}>${escapeHtml(val)}</textarea>`;
      if (!revealed) body += `<button class="essay-reveal" data-qi="${i}">💡 모범답안 보기</button>`;
    } else { // short
      const val = state.answers[i] ?? '';
      const inpCls = revealed ? (correct ? 'correct' : 'wrong') : '';
      body = `<div class="short-row">
        <input type="text" class="short-input ${inpCls}" data-qi="${i}" value="${escapeHtml(val)}" placeholder="답을 입력하고 Enter 또는 '제출'" ${revealed?'disabled':''}>
        <button class="short-submit" data-qi="${i}" ${revealed?'disabled':''}>제출</button>
      </div>`;
    }

    let explainHtml = '';
    if (revealed) {
      if (q.type === 'essay') {
        const kp = (q.keypoints || []).map(k => `<li>${escapeHtml(k)}</li>`).join('');
        explainHtml = `
          <div class="essay-answer">
            <span class="ea-label">📖 모범답안</span>
            <div class="ea-summary">${escapeHtml(q.answer)}</div>
            ${kp ? `<ul>${kp}</ul>` : ''}
            ${q.explain ? `<div class="ea-foot">${escapeHtml(q.explain)}</div>` : ''}
          </div>`;
      } else {
        explainHtml = `
          <div class="explain show">
            <span class="explain-label">${correct ? '✅ 정답!' : '❌ 오답'}</span>
            ${escapeHtml(q.explain)}
            ${q.type === 'short' ? `<span class="ans-line">📖 정답: ${escapeHtml(q.answer)}${q.alts && q.alts.length ? ' (또는 ' + q.alts.map(escapeHtml).join(' / ') + ')' : ''}</span>` : ''}
          </div>`;
      }
    }

    const pointBadge = q.type === 'essay' ? '' : `<span class="q-point">${POINTS[q.type]}점</span>`;
    const finalCardClass = q.type === 'essay' ? '' : cardClass;
    return `
      <div class="question-card ${finalCardClass}" id="q-${i}">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <span class="q-tag ${typeClass(q.type)}">${tLabel}</span>
          ${pointBadge}
          <span class="q-tag">${q.ch}장</span>
          ${bookBadge}
        </div>
        <div class="q-text">${escapeHtml(q.q)}</div>
        ${body}
        ${explainHtml}
      </div>`;
  }).join('');

  // OX 버튼
  container.querySelectorAll('.ox-btn').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const v = el.dataset.ox;
      state.answers[qi] = v;
      state.revealed[qi] = true;
      state.correct[qi] = isCorrect(state.questions[qi], v);
      render(); updateProgress();
    });
  });
  // 객관식
  container.querySelectorAll('.choice').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const ci = parseInt(el.dataset.ci);
      state.answers[qi] = ci;
      state.revealed[qi] = true;
      state.correct[qi] = isCorrect(state.questions[qi], ci);
      render(); updateProgress();
    });
  });
  // 주관식
  container.querySelectorAll('.short-input').forEach(inp => {
    if (inp.disabled) return;
    inp.addEventListener('input', () => {
      state.answers[parseInt(inp.dataset.qi)] = inp.value;
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitShort(parseInt(inp.dataset.qi)); }
    });
  });
  container.querySelectorAll('.short-submit').forEach(btn => {
    if (btn.disabled) return;
    btn.addEventListener('click', () => submitShort(parseInt(btn.dataset.qi)));
  });
  // 서술형
  container.querySelectorAll('.essay-textarea').forEach(ta => {
    if (ta.disabled) return;
    ta.addEventListener('input', () => {
      state.answers[parseInt(ta.dataset.qi)] = ta.value;
    });
  });
  container.querySelectorAll('.essay-reveal').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi);
      state.revealed[qi] = true;
      render(); updateProgress();
    });
  });

  updateProgress();
}

function submitShort(qi) {
  const val = state.answers[qi] ?? '';
  state.revealed[qi] = true;
  state.correct[qi] = isCorrect(state.questions[qi], val);
  render(); updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = total ? `${(answered/total)*100}%` : '0%';

  if (state.mode === 'essay') {
    document.getElementById('score-badge').textContent = `열람 ${answered}`;
    document.getElementById('points-badge').textContent = '연습 모드';
    return;
  }
  let correct = 0, earned = 0, maxPts = 0;
  state.questions.forEach((q, i) => {
    maxPts += POINTS[q.type] || 0;
    if (state.correct[i]) { correct++; earned += POINTS[q.type] || 0; }
  });
  document.getElementById('score-badge').textContent = `정답 ${correct}`;
  document.getElementById('points-badge').textContent = `${earned} / ${maxPts}점`;
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const chs = ['all', ...CHAPTERS.filter(c => state.questions.some(q => q.ch === c))];
  bar.innerHTML = chs.map(c => {
    const label = c === 'all' ? `전체 (${state.questions.length})` : `${c}장 (${state.questions.filter(q => q.ch === c).length})`;
    const cls = state.filter === c ? 'filter-btn active' : 'filter-btn';
    return `<button class="${cls}" data-f="${c}">${label}</button>`;
  }).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filter = btn.dataset.f;
      renderFilters(); render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function renderPoolInfo() {
  const info = document.getElementById('pool-info');
  const byType = (t) => POOL.filter(q => q.type === t).length;
  const bookN = POOL.filter(q => q.book).length;
  info.textContent = `문제 풀: 총 ${POOL.length}문제 (OX ${byType('ox')} / 주관식 ${byType('short')} / 객관식 ${byType('choice')} / 서술형 ${byType('essay')}) · 교재 확인 문제 ${bookN}개`;
}

function applyModeUI() {
  const isEssay = state.mode === 'essay';
  const subtitle = document.querySelector('header p');
  if (subtitle) {
    subtitle.textContent = isEssay
      ? '서술형 연습 (자가학습용 — 점수 미반영) · 모범답안 보기로 확인'
      : '1장~6장 (03-2 제외) · OX 1점 / 주관식 2점 / 객관식 3점 · 40점 만점 랜덤';
  }
  document.getElementById('submit-btn').style.display = isEssay ? 'none' : '';
  document.getElementById('mode-btn').textContent = isEssay ? '🎯 시험 모드로' : '📝 서술형 연습';
  document.getElementById('reset-btn').textContent = isEssay ? '🔄 처음부터 다시' : '🎲 새 세트로 다시 풀기';
}

// ============ 이벤트 ============
document.getElementById('submit-btn').addEventListener('click', () => {
  if (state.mode === 'essay') return; // 서술형 모드에서는 결과 보기 비활성
  let correct = 0, earned = 0, maxPts = 0;
  state.questions.forEach((q, i) => {
    maxPts += POINTS[q.type] || 0;
    if (state.correct[i]) { correct++; earned += (POINTS[q.type] || 0); }
  });
  const percent = Math.round((earned / maxPts) * 100);
  document.getElementById('result-score').textContent = `${earned} / ${maxPts}점`;
  document.getElementById('result-detail').textContent = `정답 ${correct}/${state.questions.length} · 정답률 ${percent}%`;

  let msg;
  if (percent >= 90) msg = '🎉 시험장 가서 무쌍찍어도 되는 수준!';
  else if (percent >= 75) msg = '👍 안정권 — 오답만 다시 확인';
  else if (percent >= 60) msg = '💪 조금 더! 📘책 뱃지 문제는 반드시 맞히기';
  else msg = '📚 교재 확인문제 위주로 다시 복습';
  document.getElementById('result-message').textContent = msg;

  // 유형별/챕터별 내역
  const breakdown = [];
  ['ox','short','choice'].forEach(t => {
    const qs = state.questions.filter(q => q.type === t);
    const cqs = qs.filter((_, idx) => {
      const globalIdx = state.questions.indexOf(qs[idx]);
      return state.correct[globalIdx];
    });
    const got = qs.reduce((s, q, idx) => {
      const gi = state.questions.indexOf(q);
      return s + (state.correct[gi] ? POINTS[t] : 0);
    }, 0);
    const max = qs.length * POINTS[t];
    if (qs.length > 0) breakdown.push(`${typeLabel(t)} ${got}/${max}점`);
  });
  document.getElementById('result-breakdown').innerHTML = breakdown.map(b => `<span>${b}</span>`).join('');
  const card = document.getElementById('result-card');
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  const msg = state.mode === 'essay'
    ? '서술형 답안과 열람 상태가 초기화됩니다. 진행할까요?'
    : '새로운 세트로 바꾸면 현재 답안이 사라집니다. 진행할까요?';
  if (Object.keys(state.revealed).length > 0 && !confirm(msg)) return;
  newRound();
});

document.getElementById('mode-btn').addEventListener('click', () => {
  const goingEssay = state.mode !== 'essay';
  if (Object.keys(state.revealed).length > 0) {
    const msg = goingEssay
      ? '서술형 연습 모드로 전환합니다. 현재 시험 답안이 사라집니다. 진행할까요?'
      : '시험 모드로 전환합니다. 서술형 작성 내용이 사라집니다. 진행할까요?';
    if (!confirm(msg)) return;
  }
  state.mode = goingEssay ? 'essay' : 'exam';
  newRound();
});

renderPoolInfo();
newRound();
</script>
</body>
</html>
