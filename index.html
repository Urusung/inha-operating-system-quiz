// ============ 출제 설정 ============
// 목표: 40점에 가깝도록 OX×10(10점) + 주관식×8(16점) + 객관식×5(15점) = 41점
const PICK = { ox: 10, short: 8, choice: 5 };
const POINTS = { ox: 1, short: 2, choice: 3 };
const CHAPTERS = ['1', '2-1', '2-2', '3-1', '4-1', '4-2', '4-3', '5-1', '5-2', '5-3', '6-1', '6-2', '6-3'];

// ============ 유틸 ============
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const escapeHtml = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function normalize(s) {
  return String(s).toLowerCase().replace(/\s+/g,'').replace(/[.,\-_/\\()\[\]{}'"`]/g,'');
}
function typeLabel(t){ return t==='ox'?'OX':t==='short'?'주관식':'객관식'; }
function typeClass(t){ return 'type-'+t; }

// ============ 상태 ============
const state = {
  questions: [],
  answers: {},    // idx -> 답(문자열 또는 숫자)
  revealed: {},   // idx -> boolean
  correct: {},    // idx -> boolean
  filter: 'all',
};

// ============ 세트 생성 ============
function buildSet() {
  const oxPool = POOL.filter(q => q.type === 'ox');
  const shortPool = POOL.filter(q => q.type === 'short');
  const choicePool = POOL.filter(q => q.type === 'choice');

  const set = [
    ...shuffle(oxPool).slice(0, PICK.ox),
    ...shuffle(shortPool).slice(0, PICK.short),
    ...shuffle(choicePool).slice(0, PICK.choice),
  ];
  // 챕터 순으로 정렬하되 type 내부는 랜덤 유지
  set.sort((a, b) => {
    const ai = CHAPTERS.indexOf(a.ch), bi = CHAPTERS.indexOf(b.ch);
    if (ai !== bi) return ai - bi;
    // 같은 챕터면 OX→주관식→객관식 순
    const order = { ox:0, short:1, choice:2 };
    return order[a.type] - order[b.type];
  });
  return set;
}

function newRound() {
  state.questions = buildSet();
  state.answers = {};
  state.revealed = {};
  state.correct = {};
  state.filter = 'all';
  document.getElementById('result-card').classList.remove('show');
  renderFilters();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 채점 ============
function isCorrect(q, ans) {
  if (ans === undefined || ans === null || ans === '') return false;
  if (q.type === 'ox') return ans === q.answer;
  if (q.type === 'choice') return ans === q.answer;
  if (q.type === 'short') {
    const na = normalize(ans);
    const pool = [q.answer, ...(q.alts || [])].map(normalize);
    return pool.includes(na);
  }
  return false;
}

// ============ 렌더링 ============
function render() {
  const container = document.getElementById('quiz-container');
  const list = state.questions
    .map((q, i) => ({ q, i }))
    .filter(x => state.filter === 'all' || x.q.ch === state.filter);

  container.innerHTML = list.map(({ q, i }) => {
    const revealed = !!state.revealed[i];
    const correct = !!state.correct[i];
    const cardClass = revealed ? (correct ? 'answered-correct' : 'answered-wrong') : '';
    const bookBadge = q.book ? '<span class="q-tag book">📘책</span>' : '';
    const tLabel = typeLabel(q.type);

    let body = '';
    if (q.type === 'ox') {
      const sel = state.answers[i];
      const mk = (v) => {
        let cls = 'ox-btn';
        if (revealed) { cls += ' disabled'; if (v === q.answer) cls += ' correct'; else if (v === sel) cls += ' wrong'; }
        else if (sel === v) cls += ' selected';
        return `<button class="${cls}" data-qi="${i}" data-ox="${v}">${v}</button>`;
      };
      body = `<div class="ox-choices">${mk('O')}${mk('X')}</div>`;
    } else if (q.type === 'choice') {
      const sel = state.answers[i];
      body = '<div class="choices">' + q.choices.map((c, ci) => {
        let cls = 'choice';
        if (revealed) { cls += ' disabled'; if (ci === q.answer) cls += ' correct'; else if (ci === sel) cls += ' wrong'; }
        else if (sel === ci) cls += ' selected';
        return `<div class="${cls}" data-qi="${i}" data-ci="${ci}"><div class="choice-num">${ci+1}</div><div class="choice-text">${escapeHtml(c)}</div></div>`;
      }).join('') + '</div>';
    } else { // short
      const val = state.answers[i] ?? '';
      const inpCls = revealed ? (correct ? 'correct' : 'wrong') : '';
      body = `<div class="short-row">
        <input type="text" class="short-input ${inpCls}" data-qi="${i}" value="${escapeHtml(val)}" placeholder="답을 입력하고 Enter 또는 '제출'" ${revealed?'disabled':''}>
        <button class="short-submit" data-qi="${i}" ${revealed?'disabled':''}>제출</button>
      </div>`;
    }

    const explainHtml = revealed ? `
      <div class="explain show">
        <span class="explain-label">${correct ? '✅ 정답!' : '❌ 오답'}</span>
        ${escapeHtml(q.explain)}
        ${q.type === 'short' ? `<span class="ans-line">📖 정답: ${escapeHtml(q.answer)}${q.alts && q.alts.length ? ' (또는 ' + q.alts.map(escapeHtml).join(' / ') + ')' : ''}</span>` : ''}
      </div>` : '';

    return `
      <div class="question-card ${cardClass}" id="q-${i}">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <span class="q-tag ${typeClass(q.type)}">${tLabel}</span>
          <span class="q-point">${POINTS[q.type]}점</span>
          <span class="q-tag">${q.ch}장</span>
          ${bookBadge}
        </div>
        <div class="q-text">${escapeHtml(q.q)}</div>
        ${body}
        ${explainHtml}
      </div>`;
  }).join('');

  // OX 버튼
  container.querySelectorAll('.ox-btn').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const v = el.dataset.ox;
      state.answers[qi] = v;
      state.revealed[qi] = true;
      state.correct[qi] = isCorrect(state.questions[qi], v);
      render(); updateProgress();
    });
  });
  // 객관식
  container.querySelectorAll('.choice').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const ci = parseInt(el.dataset.ci);
      state.answers[qi] = ci;
      state.revealed[qi] = true;
      state.correct[qi] = isCorrect(state.questions[qi], ci);
      render(); updateProgress();
    });
  });
  // 주관식
  container.querySelectorAll('.short-input').forEach(inp => {
    if (inp.disabled) return;
    inp.addEventListener('input', () => {
      state.answers[parseInt(inp.dataset.qi)] = inp.value;
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitShort(parseInt(inp.dataset.qi)); }
    });
  });
  container.querySelectorAll('.short-submit').forEach(btn => {
    if (btn.disabled) return;
    btn.addEventListener('click', () => submitShort(parseInt(btn.dataset.qi)));
  });

  updateProgress();
}

function submitShort(qi) {
  const val = state.answers[qi] ?? '';
  state.revealed[qi] = true;
  state.correct[qi] = isCorrect(state.questions[qi], val);
  render(); updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  let correct = 0, earned = 0, maxPts = 0;
  state.questions.forEach((q, i) => {
    maxPts += POINTS[q.type];
    if (state.correct[i]) { correct++; earned += POINTS[q.type]; }
  });
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(answered/total)*100}%`;
  document.getElementById('score-badge').textContent = `정답 ${correct}`;
  document.getElementById('points-badge').textContent = `${earned} / ${maxPts}점`;
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const chs = ['all', ...CHAPTERS.filter(c => state.questions.some(q => q.ch === c))];
  bar.innerHTML = chs.map(c => {
    const label = c === 'all' ? `전체 (${state.questions.length})` : `${c}장 (${state.questions.filter(q => q.ch === c).length})`;
    const cls = state.filter === c ? 'filter-btn active' : 'filter-btn';
    return `<button class="${cls}" data-f="${c}">${label}</button>`;
  }).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filter = btn.dataset.f;
      renderFilters(); render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function renderPoolInfo() {
  const info = document.getElementById('pool-info');
  const byType = (t) => POOL.filter(q => q.type === t).length;
  const bookN = POOL.filter(q => q.book).length;
  info.textContent = `문제 풀: 총 ${POOL.length}문제 (OX ${byType('ox')} / 주관식 ${byType('short')} / 객관식 ${byType('choice')}) · 교재 확인 문제 ${bookN}개`;
}

// ============ 이벤트 ============
document.getElementById('submit-btn').addEventListener('click', () => {
  let correct = 0, earned = 0, maxPts = 0;
  state.questions.forEach((q, i) => {
    maxPts += POINTS[q.type];
    if (state.correct[i]) { correct++; earned += POINTS[q.type]; }
  });
  const percent = Math.round((earned / maxPts) * 100);
  document.getElementById('result-score').textContent = `${earned} / ${maxPts}점`;
  document.getElementById('result-detail').textContent = `정답 ${correct}/${state.questions.length} · 정답률 ${percent}%`;

  let msg;
  if (percent >= 90) msg = '🎉 시험장 가서 무쌍찍어도 되는 수준!';
  else if (percent >= 75) msg = '👍 안정권 — 오답만 다시 확인';
  else if (percent >= 60) msg = '💪 조금 더! 📘책 뱃지 문제는 반드시 맞히기';
  else msg = '📚 교재 확인문제 위주로 다시 복습';
  document.getElementById('result-message').textContent = msg;

  // 유형별/챕터별 내역
  const breakdown = [];
  ['ox','short','choice'].forEach(t => {
    const qs = state.questions.filter(q => q.type === t);
    const cqs = qs.filter((_, idx) => {
      const globalIdx = state.questions.indexOf(qs[idx]);
      return state.correct[globalIdx];
    });
    const got = qs.reduce((s, q, idx) => {
      const gi = state.questions.indexOf(q);
      return s + (state.correct[gi] ? POINTS[t] : 0);
    }, 0);
    const max = qs.length * POINTS[t];
    if (qs.length > 0) breakdown.push(`${typeLabel(t)} ${got}/${max}점`);
  });
  document.getElementById('result-breakdown').innerHTML = breakdown.map(b => `<span>${b}</span>`).join('');
  const card = document.getElementById('result-card');
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (Object.keys(state.revealed).length > 0 && !confirm('새로운 세트로 바꾸면 현재 답안이 사라집니다. 진행할까요?')) return;
  newRound();
});

renderPoolInfo();
newRound();
</script>
